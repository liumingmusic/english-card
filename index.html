<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
  <meta name="theme-color" content="#eef3ff" />
  <link rel="icon" href="data:," />
  <title>背单词 · Word Books</title>
  <link rel="stylesheet" href="./assets/css/style.css" />
</head>
<body>
  <header class="topbar">
    <div class="topbar-inner">
      <div class="brand">
        <span class="brand-mark">A</span>
        <div class="brand-text">
          <strong>背单词</strong>
          <small>选单词本 · 浏览全部 · 逐个攻克</small>
        </div>
      </div>
      <div class="topbar-right">
        <div class="progress" title="学习进度">
          <span>掌握 <b id="masteredCount">0</b></span>
          <span class="dot">·</span>
          <span>收藏 <b id="favCount">0</b></span>
        </div>
      </div>
    </div>
  </header>

  <main class="layout">
    <!-- 左栏：单词本选择 + 可滚动单词列表 -->
    <section class="books-pane">
      <div class="books" id="bookChips"></div>
      <div class="search-row">
        <input type="search" id="searchInput" placeholder="搜索单词或中文释义…" />
      </div>
      <div class="list-meta" id="listMeta"></div>
      <ul class="word-list" id="wordList"></ul>
    </section>

    <!-- 右栏：可滚动单词详情页 -->
    <section class="detail-pane" id="detailPane">
      <button class="back-btn" id="backBtn">← 返回列表</button>
      <div class="detail-scroll" id="detailScroll">
        <div class="d-empty" id="dEmpty">
          <p>← 从左侧选择一个单词查看详情</p>
          <p class="sub">支持选单词本、搜索、收藏 / 标记掌握 / 待复习。</p>
        </div>

        <div class="d-body" id="dBody" hidden>
          <div class="d-head">
            <div>
              <div class="d-word" id="dWord"></div>
              <div class="d-phon" id="dPhon"></div>
            </div>
            <button class="speak-btn big" id="dSpeak" aria-label="发音">🔊</button>
          </div>
          <div class="d-level" id="dLevel"></div>
          <div class="d-cn" id="dCn"></div>
          <div class="d-en" id="dEn"></div>

          <div class="d-section">
            <h3>例句</h3>
            <div class="examples" id="dExamples"></div>
          </div>
          <div class="d-section">
            <h3>同义词</h3>
            <div class="chips" id="dSyn"></div>
          </div>
          <div class="d-section">
            <h3>反义词</h3>
            <div class="chips" id="dAnt"></div>
          </div>
          <div class="d-section">
            <h3>用法</h3>
            <div class="usage" id="dUsage"></div>
          </div>

          <div class="d-actions">
            <button class="btn" id="dPrev">← 上一个</button>
            <button class="btn" id="dNext">下一个 →</button>
            <button class="btn btn-fav" id="dFav">☆ 收藏</button>
            <button class="btn btn-master" id="dMaster">✓ 已掌握</button>
            <button class="btn btn-review" id="dReview">↺ 待复习</button>
          </div>
        </div>
      </div>
    </section>
  </main>

  <script src="./assets/js/app.js"></script>
</body>
</html>
